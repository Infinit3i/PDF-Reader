<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Reader</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="toolbar">
    <label class="filebtn" for="fileInput">Open File</label>
    <input type="file" id="fileInput" accept="application/pdf,text/plain,.txt">
    <button id="zoomOut" disabled>&minus;</button>
    <span id="zoomLabel">150%</span>
    <button id="zoomIn" disabled>+</button>
    <div id="pageGroup">
      <input type="number" id="pageInput" min="1" value="1" disabled>
      <span id="pageCount">/ 0</span>
    </div>
    <span class="spacer"></span>
    <select id="voice" disabled title="Voice"></select>
    <label id="rateLabel" title="Reading speed (words per minute)">175 wpm
      <span id="rateWrap">
        <input type="range" id="rate" min="0.5" max="2" step="0.1" value="1.4" disabled>
        <span id="rateMult">1.4x</span>
      </span>
    </label>
    <label id="autoLabel" title="Auto-advance to next page">
      <input type="checkbox" id="autoAdvance" checked disabled> Auto
    </label>
    <span id="status"></span>
  </div>
  <div id="viewer">
    <button id="speak" disabled title="Play / Pause">&#9654;</button>
    <div id="empty">Open a PDF or .txt file to start reading.</div>
    <div id="pageWrap" style="display:none">
      <canvas id="canvas"></canvas>
      <div id="textLayer"></div>
      <div id="txtView"></div>
      <button id="navPrev" class="sidenav" disabled title="Previous page">&#10094;</button>
      <button id="navNext" class="sidenav" disabled title="Next page">&#10095;</button>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
